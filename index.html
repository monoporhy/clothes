<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服カタログ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #111; padding: 16px; max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 1.4rem; font-weight: 600; }

    /* Filter buttons */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filters button {
      padding: 6px 14px; border: 1px solid #ccc; background: #fff;
      border-radius: 4px; cursor: pointer; font-size: 0.875rem; font-family: inherit;
      transition: background 0.1s, color 0.1s;
    }
    .filters button.active { background: #111; color: #fff; border-color: #111; }
    .filters button:hover:not(.active) { background: #f5f5f5; }

    /* Table */
    .table-section { margin-bottom: 48px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      text-align: left; padding: 8px 10px; border-bottom: 2px solid #111;
      white-space: nowrap; font-weight: 600; cursor: pointer; user-select: none;
    }
    th:hover { background: #f5f5f5; }
    th .sort-icon { display: inline-block; margin-left: 4px; opacity: 0.3; font-size: 0.75rem; }
    th.sort-asc .sort-icon, th.sort-desc .sort-icon { opacity: 1; }
    td { padding: 8px 10px; border-bottom: 1px solid #eee; white-space: nowrap; }
    td.dim { text-align: right; color: #555; }
    td.no { color: #999; font-size: 0.8rem; text-align: right; width: 2rem; }
    td.name {
      max-width: 180px; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; white-space: nowrap;
    }
    td.name.expanded { white-space: normal; overflow: visible; text-overflow: unset; max-width: none; }
    tbody tr:hover td { background: #f9f9f9; }
    tbody tr.hidden { display: none; }
    td a { color: #111; text-decoration: underline; font-size: 0.8rem; }

    /* Responsive: hide dim columns on narrow screens */
    @media (max-width: 600px) {
      td.dim-hide, th.dim-hide { display: none; }
      td.name { max-width: 120px; }
      body { padding: 12px; }
    }
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <h1>服カタログ</h1>
    <a href="coordinate.html" style="font-size:0.875rem;color:#111;text-decoration:underline;">コーデを見る →</a>
  </div>

  <div class="filters" id="filters"></div>

  <div class="table-section">
    <table id="table">
      <thead>
        <tr id="thead-row">
          <th data-col="no" class="no-col">No<span class="sort-icon">↕</span></th>
          <th data-col="category">カテゴリ<span class="sort-icon">↕</span></th>
          <th data-col="name">名称<span class="sort-icon">↕</span></th>
          <th data-col="color">カラー<span class="sort-icon">↕</span></th>
          <th data-col="size">サイズ<span class="sort-icon">↕</span></th>
          <th data-col="着丈" class="dim-hide">着丈<span class="sort-icon">↕</span></th>
          <th data-col="肩幅" class="dim-hide">肩幅<span class="sort-icon">↕</span></th>
          <th data-col="身幅" class="dim-hide">身幅<span class="sort-icon">↕</span></th>
          <th data-col="袖丈" class="dim-hide">袖丈<span class="sort-icon">↕</span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    const FILTER_CATS = ['すべて', 'トップス', 'ボトムス'];
    const DIM_KEYS = ['着丈', '肩幅', '身幅', '袖丈'];

    function dimVal(item, key) {
      const v = (item.dimensions || {})[key];
      return v != null ? v : null;
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    let allItems = [];
    let filterCat = 'すべて';
    let sortCol = null;
    let sortDir = 1; // 1=asc, -1=desc

    function sortValue(item, col, idx) {
      if (col === 'no') return idx;
      if (col === 'category') return item.category || '';
      if (col === 'name') return item.name || '';
      if (col === 'color') return item.color || '';
      if (col === 'size') return item.size || '';
      if (DIM_KEYS.includes(col)) return (item.dimensions || {})[col] ?? -Infinity;
      return '';
    }

    function getVisibleItems() {
      return allItems
        .map((item, idx) => ({ item, idx }))
        .filter(({ item }) => filterCat === 'すべて' || item.category === filterCat);
    }

    function getSortedItems() {
      const visible = getVisibleItems();
      if (!sortCol) return visible;
      return [...visible].sort((a, b) => {
        const va = sortValue(a.item, sortCol, a.idx);
        const vb = sortValue(b.item, sortCol, b.idx);
        if (va < vb) return -sortDir;
        if (va > vb) return sortDir;
        return 0;
      });
    }

    function renderRows() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      getSortedItems().forEach(({ item, idx }, i) => {
        const tr = document.createElement('tr');
        tr.dataset.id = item.id;
        tr.innerHTML = `
          <td class="no">${idx + 1}</td>
          <td>${escHtml(item.category)}</td>
          <td class="name" title="${escHtml(item.name)}">${escHtml(item.name)}</td>
          <td>${escHtml(item.color)}</td>
          <td>${escHtml(item.size)}</td>
          ${DIM_KEYS.map(k => {
            const v = dimVal(item, k);
            return `<td class="dim dim-hide">${v != null ? v : '-'}</td>`;
          }).join('')}
        `;
        tr.querySelector('td.name').addEventListener('click', e => {
          e.currentTarget.classList.toggle('expanded');
        });
        tbody.appendChild(tr);
      });
    }

    function updateSortHeaders() {
      document.querySelectorAll('#thead-row th').forEach(th => {
        th.classList.remove('sort-asc', 'sort-desc');
        const icon = th.querySelector('.sort-icon');
        if (icon) icon.textContent = '↕';
        if (th.dataset.col === sortCol) {
          th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
          if (icon) icon.textContent = sortDir === 1 ? '↑' : '↓';
        }
      });
    }

    function render(items) {
      allItems = items;

      // Filter buttons (fixed list)
      const filtersEl = document.getElementById('filters');
      filtersEl.innerHTML = '';
      FILTER_CATS.forEach(cat => {
        const btn = document.createElement('button');
        btn.textContent = cat;
        if (cat === filterCat) btn.classList.add('active');
        btn.addEventListener('click', () => {
          filterCat = cat;
          document.querySelectorAll('#filters button').forEach(b =>
            b.classList.toggle('active', b.textContent === filterCat));
          renderRows();
        });
        filtersEl.appendChild(btn);
      });

      // Sort header clicks
      document.querySelectorAll('#thead-row th[data-col]').forEach(th => {
        th.addEventListener('click', () => {
          if (sortCol === th.dataset.col) {
            sortDir *= -1;
          } else {
            sortCol = th.dataset.col;
            sortDir = 1;
          }
          updateSortHeaders();
          renderRows();
        });
      });

      renderRows();
    }

    fetch('clothes.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(items => render(items))
      .catch(err => {
        document.body.insertAdjacentHTML('beforeend',
          `<p style="color:red;margin-top:16px">clothes.json の読み込みに失敗しました (${err.message})</p>`);
      });
  </script>
</body>
</html>
