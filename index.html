<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服カタログ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #111; padding: 24px; max-width: 1300px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 20px; font-weight: 600; }

    /* Filter area */
    .filter-area { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
    .filter-selects { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-selects select {
      padding: 6px 10px; border: 1px solid #ccc; background: #fff;
      border-radius: 4px; cursor: pointer; font-size: 0.875rem; font-family: inherit;
    }

    /* Filter buttons */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filters button {
      padding: 6px 14px; border: 1px solid #ccc; background: #fff;
      border-radius: 4px; cursor: pointer; font-size: 0.875rem; font-family: inherit;
      transition: background 0.1s, color 0.1s;
    }
    .filters button.active { background: #111; color: #fff; border-color: #111; }
    .filters button:hover:not(.active) { background: #f5f5f5; }

    /* Table */
    .table-section { margin-bottom: 48px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #111; white-space: nowrap; font-weight: 600; }
    td { padding: 8px 12px; border-bottom: 1px solid #eee; white-space: nowrap; }
    td.dim { text-align: right; color: #555; }
    tbody tr:hover td { background: #f9f9f9; }
    tbody tr.hidden { display: none; }
    td a { color: #111; text-decoration: underline; font-size: 0.8rem; }

  </style>
</head>
<body>
  <h1>服カタログ</h1>

  <div class="filter-area">
    <div class="filters" id="filters"></div>
    <div class="filter-selects">
      <select id="filter-color"><option value="">カラー: すべて</option></select>
      <select id="filter-size"><option value="">サイズ: すべて</option></select>
    </div>
  </div>

  <div class="table-section">
    <table>
      <thead>
        <tr>
          <th>カテゴリ</th>
          <th>ブランド</th>
          <th>名称</th>
          <th>カラー</th>
          <th>サイズ</th>
          <th>着丈</th>
          <th>肩幅</th>
          <th>身幅</th>
          <th>袖丈</th>
          <th>URL</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    const TOP_DIM_KEYS = ['着丈', '肩幅', '身幅', '袖丈'];

    function dimCell(item, key) {
      const v = (item.dimensions || {})[key];
      return v != null ? v : '-';
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    let filterCat = 'すべて';
    let filterColor = '';
    let filterSize = '';

    function applyFilter() {
      document.querySelectorAll('#filters button').forEach(b => {
        b.classList.toggle('active', b.textContent === filterCat);
      });
      document.querySelectorAll('#tbody tr[data-id]').forEach(tr => {
        const catOk = filterCat === 'すべて' || tr.dataset.cat === filterCat;
        const colorOk = !filterColor || tr.dataset.color === filterColor;
        const sizeOk = !filterSize || tr.dataset.size === filterSize;
        tr.classList.toggle('hidden', !(catOk && colorOk && sizeOk));
      });
    }

    function render(items) {
      // Category filter buttons
      const categories = ['すべて', ...new Set(items.map(i => i.category))];
      const filtersEl = document.getElementById('filters');
      filtersEl.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.textContent = cat;
        if (cat === filterCat) btn.classList.add('active');
        btn.addEventListener('click', () => { filterCat = cat; applyFilter(); });
        filtersEl.appendChild(btn);
      });

      // Color select
      const colors = ['', ...new Set(items.map(i => i.color).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ja'));
      const colorSel = document.getElementById('filter-color');
      colorSel.innerHTML = '<option value="">カラー: すべて</option>';
      colors.filter(c => c).forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        if (c === filterColor) opt.selected = true;
        colorSel.appendChild(opt);
      });
      colorSel.onchange = () => { filterColor = colorSel.value; applyFilter(); };

      // Size select
      const sizes = [...new Set(items.map(i => i.size).filter(Boolean))].sort();
      const sizeSel = document.getElementById('filter-size');
      sizeSel.innerHTML = '<option value="">サイズ: すべて</option>';
      sizes.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        if (s === filterSize) opt.selected = true;
        sizeSel.appendChild(opt);
      });
      sizeSel.onchange = () => { filterSize = sizeSel.value; applyFilter(); };

      // Table rows
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      items.forEach(item => {
        const tr = document.createElement('tr');
        tr.dataset.id = item.id;
        tr.dataset.cat = item.category;
        tr.dataset.color = item.color || '';
        tr.dataset.size = item.size || '';
        const urlCell = item.url
          ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">開く</a>`
          : '';
        tr.innerHTML = `
          <td>${escHtml(item.category)}</td>
          <td>${escHtml(item.brand)}</td>
          <td>${escHtml(item.name)}</td>
          <td>${escHtml(item.color)}</td>
          <td>${escHtml(item.size)}</td>
          ${TOP_DIM_KEYS.map(k => `<td class="dim">${escHtml(dimCell(item, k))}</td>`).join('')}
          <td>${urlCell}</td>
        `;
        tbody.appendChild(tr);
      });

      applyFilter();
    }

    fetch('clothes.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(items => render(items))
      .catch(err => {
        document.body.insertAdjacentHTML('beforeend',
          `<p style="color:red;margin-top:16px">clothes.json の読み込みに失敗しました (${err.message})</p>`);
      });
  </script>
</body>
</html>
